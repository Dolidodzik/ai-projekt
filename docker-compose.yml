services:
  app:
    build:
      context: ./docker/php
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: ai2_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
    environment:
      ROUTE_PLANNER_URL: ${ROUTE_PLANNER_URL:-http://route-planner:8000}
    depends_on:
      db:
        condition: service_healthy
      route-planner:
        condition: service_healthy
    networks:
      - ai2_net

  route-planner:
    build:
      context: ./route-planner
    container_name: ai2_route_planner
    restart: unless-stopped
    volumes:
      - ./route-planner/app:/app/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-ai2_projekt}
      DB_USERNAME: ${POSTGRES_USER:-ai2_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ai2_secret}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - ai2_net

  scheduler:
    build:
      context: ./docker/php
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: ai2_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "until php artisan about >/dev/null 2>&1; do sleep 2; done;
      until php -r 'require \"vendor/autoload.php\"; $$app=require \"bootstrap/app.php\"; $$kernel=$$app->make(Illuminate\\Contracts\\Console\\Kernel::class); $$kernel->bootstrap(); exit(Illuminate\\Support\\Facades\\Schema::hasTable(\"migrations\") ? 0 : 1);'; do sleep 2; done;
      php artisan schedule:work"
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
    environment:
      ROUTE_PLANNER_URL: ${ROUTE_PLANNER_URL:-http://route-planner:8000}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
      route-planner:
        condition: service_healthy
    networks:
      - ai2_net

  nginx:
    image: nginx:1.27-alpine
    container_name: ai2_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ai2_net

  db:
    image: postgres:16-alpine
    container_name: ai2_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai2_projekt}
      POSTGRES_USER: ${POSTGRES_USER:-ai2_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai2_secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai2_user} -d ${POSTGRES_DB:-ai2_projekt}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ai2_net

  node:
    build:
      context: ./docker/node
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: ai2_node
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    volumes:
      - ./frontend:/app
    ports:
      - "${VITE_PORT:-5173}:5173"
    networks:
      - ai2_net

networks:
  ai2_net:
    driver: bridge

volumes:
  pg_data:
    driver: local
